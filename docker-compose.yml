services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: cad-digitizer-api
    ports:
      - "8000:8000"
    env_file:
      - backend-python/.env
    environment:
      - HOST=0.0.0.0
      - PORT=8000
      - PG_HOST=host.docker.internal
      - PG_PORT=5432
      - PG_DATABASE=cad_digitizer
      - PG_USER=postgres
      - PG_PASSWORD=postgres
    volumes:
      - cad_temp:/tmp/cad_digitizer_outputs
      - cad_uploads:/tmp/cad_digitizer_uploads
    restart: unless-stopped
    networks:
      - cad-network
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: cad-digitizer-frontend
    ports:
      - "127.0.0.1:8080:80"
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - cad-network

volumes:
  cad_temp:
  cad_uploads:

networks:
  cad-network:
    driver: bridge
