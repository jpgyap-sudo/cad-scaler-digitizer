# =============================================================================
# CAD Scaler Digitizer — Nginx Production Configuration
# Routes:
#   /               → Frontend (React/Vite static)
#   /api/*          → Node API Reference Library (Express + Prisma, port 4000)
#   /api/brain/*    → Node API Session Management (Express + PG, port 5001)
#   /py-api/*       → Python Worker (FastAPI, port 8001)
# =============================================================================

upstream node_ref_api {
    server node-api:4000;
}

upstream node_session_api {
    server node-api:5001;
}

upstream python_worker {
    server python-worker:8001;
}

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    client_max_body_size 100M;
    proxy_connect_timeout 120s;
    proxy_send_timeout 120s;
    proxy_read_timeout 120s;

    # ---- Gzip ----
    gzip on;
    gzip_types text/plain text/css application/json application/javascript image/svg+xml;
    gzip_min_length 256;

    # ---- Security headers ----
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # ---- Node Session Management - upload/download proxy ----
    location /api/upload {
        proxy_pass http://node_session_api;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    location /api/download/ {
        proxy_pass http://node_session_api;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/cad-engine/ {
        proxy_pass http://node_session_api;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ---- Node Session Management (/api/brain/) ----
    location /api/brain/ {
        proxy_pass http://node_session_api;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ---- Node Reference API (/api/) ----
    location /api/ {
        proxy_pass http://node_ref_api;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ---- Python Worker (/py-api/ → /api/) ----
    location /py-api/ {
        rewrite ^/py-api/health$ /health break;
        rewrite ^/py-api/(.*)$ /api/$1 break;
        proxy_pass http://python_worker;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ---- Health checks ----
    location /health {
        proxy_pass http://node_ref_api/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    location /health/py {
        proxy_pass http://python_worker/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # ---- Frontend static files ----
    location / {
        try_files $uri $uri/ /index.html;
        expires -1;
        add_header Cache-Control "no-cache, must-revalidate";

        # Cache static assets long-term
        if ($uri ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$) {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }

    # ---- Error pages ----
    error_page 404 /index.html;
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
